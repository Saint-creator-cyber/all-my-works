<!DOCTYPE html>
<html lang="en-NG">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BUO Properties & Autos | Premium Marketplace</title>

    <!-- External Resources -->
    <script src="https://tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cloudflare.com">

    <style>
        /* CSS STYLES */
        :root {
            --buo-orange: #ff4d00;
            --buo-dark: #1a1a1a;
            --whatsapp-green: #25d366;
        }

        body {
            background-color: #f7f7f7;
            font-family: 'Inter', sans-serif;
            scroll-behavior: smooth;
        }

        /* Jumia Image Gallery Styles */
        .gallery-main-img {
            width: 100%;
            height: 400px;
            object-fit: cover;
            border-radius: 8px;
            transition: transform 0.5s ease;
        }

        .gallery-main-img:hover {
            transform: scale(1.03);
        }

        .thumb-nail {
            width: 80px;
            height: 60px;
            object-fit: cover;
            border: 2px solid transparent;
            border-radius: 4px;
            cursor: pointer;
            transition: 0.2s;
        }

        .thumb-active {
            border-color: var(--buo-orange) !important;
        }

        /* Temu-Style Urgency Animation */
        .btn-shine {
            position: relative;
            overflow: hidden;
        }

        .btn-shine::after {
            content: "";
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.4), transparent);
            transform: rotate(45deg);
            animation: shineEffect 3s infinite;
        }

        @keyframes shineEffect {
            0% {
                left: -100%;
            }

            100% {
                left: 100%;
            }
        }

        .urgency-badge {
            background: rgba(255, 77, 0, 0.08);
            border: 1px dashed var(--buo-orange);
        }
    </style>
</head>

<body>

    <!-- NAV BAR -->
    <header class="bg-white shadow-md sticky top-0 z-50">
        <div class="container mx-auto px-4 py-3 flex items-center justify-between">
            <a href="#" class="text-3xl font-black text-[#ff4d00]">BUO<span class="text-black">.</span></a>
            <div class="hidden md:flex flex-1 mx-8">
                <input type="text" placeholder="Search cars or houses in Abuja/Lagos..."
                    class="w-full border-2 border-gray-100 rounded-lg px-4 py-2 focus:border-orange-500 outline-none">
            </div>
            <div class="flex space-x-6 text-gray-700">
                <a href="#" class="hover:text-orange-500"><i class="fa-regular fa-user text-xl"></i></a>
                <a href="#" class="hover:text-orange-500"><i class="fa-regular fa-heart text-xl"></i></a>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8 flex flex-col lg:flex-row gap-8">

        <!-- LEFT: JUMIA-STYLE GALLERY -->
        <div class="lg:w-2/3">
            <div class="bg-white p-4 rounded-xl shadow-sm">
                <!-- Main Display Image -->
                <div class="overflow-hidden rounded-lg mb-4">
                    <img id="mainImage" src="https://unsplash.com" alt="House" class="gallery-main-img">
                </div>
                <!-- Clickable Thumbnails -->
                <div class="flex gap-3 overflow-x-auto" id="thumbnailBar">
                    <img src="https://unsplash.com" class="thumb-nail thumb-active" onclick="changeImage(this)">
                    <img src="https://unsplash.com" class="thumb-nail" onclick="changeImage(this)">
                    <img src="https://unsplash.com" class="thumb-nail" onclick="changeImage(this)">
                    <img src="https://unsplash.com" class="thumb-nail" onclick="changeImage(this)">
                </div>
            </div>
        </div>

        <!-- RIGHT: TEMU-STYLE ACTION PANEL -->
        <div class="lg:w-1/3">
            <div class="bg-white p-6 rounded-xl shadow-lg border-t-4 border-[#ff4d00]">
                <h1 class="text-2xl font-black text-gray-900">Modern 5-Bed Duplex</h1>
                <p class="text-xs text-gray-400 mt-1"><i class="fa-solid fa-location-dot text-red-500"></i> Maitama,
                    Abuja</p>

                <div class="my-6">
                    <span class="text-3xl font-black text-[#ff4d00]">₦12,500,000</span>
                    <span class="text-xs text-gray-500">/ per year</span>
                </div>

                <!-- Urgency Card -->
                <div class="urgency-badge p-3 rounded-lg mb-6 flex items-center">
                    <i class="fa-solid fa-bolt-lightning text-orange-600 mr-3 animate-bounce"></i>
                    <div>
                        <p class="text-[10px] font-bold text-orange-600 uppercase">High Demand!</p>
                        <p class="text-[11px] text-gray-700">8 people recently contacted this agent.</p>
                    </div>
                </div>

                <!-- Action Links -->
                <div class="space-y-3">
                    <a href="https://wa.me"
                        class="btn-shine w-full bg-[#25d366] text-white py-4 rounded-xl flex items-center justify-center font-bold shadow-md hover:scale-[1.01] transition">
                        <i class="fa-brands fa-whatsapp text-xl mr-3"></i> CHAT WITH AGENT
                    </a>
                    <a href="tel:+2348000000000"
                        class="w-full bg-black text-white py-4 rounded-xl flex items-center justify-center font-bold hover:bg-gray-800 transition">
                        <i class="fa-solid fa-phone mr-3"></i> CALL AGENT
                    </a>
                </div>
            </div>
        </div>
    </main>

    <!-- JAVASCRIPT CODE -->
    <script>
        /**
         * Image Gallery Controller
         * Changes the main image source when a thumbnail is clicked.
         */
        function changeImage(thumbnailElement) {
            // 1. Get the main image element
            const mainImg = document.getElementById('mainImage');

            // 2. Change its source to the clicked thumbnail's source
            mainImg.src = thumbnailElement.src;

            // 3. Remove 'thumb-active' class from all thumbnails
            const allThumbs = document.querySelectorAll('.thumb-nail');
            allThumbs.forEach(thumb => thumb.classList.remove('thumb-active'));

            // 4. Add 'thumb-active' to the clicked one for the orange border
            thumbnailElement.classList.add('thumb-active');

            // 5. Add a small fade-in animation to the main image
            mainImg.style.opacity = 0;
            setTimeout(() => {
                mainImg.style.opacity = 1;
                mainImg.style.transition = 'opacity 0.3s ease';
            }, 50);
        }

        // Auto-Urgency Timer (Optional Temu feature)
        // You can add logic here to update the "X people viewing" count every minute.
    </script>

</body>

</html>
