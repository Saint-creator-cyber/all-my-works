<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAVE 2026 | Secure Portal</title>
    <style>
        /* Base styles */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        body {
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(to bottom, #111, #222);
        }

        /* Animated floating backgrounds from the video */
        .background {
            position: absolute;
            width: 100vw;
            height: 100vh;
            z-index: -1;
        }

        .shape {
            position: absolute;
            filter: blur(80px);
            border-radius: 50%;
            animation: move 20s infinite alternate;
        }

        .shape:nth-child(1) { width: 400px; height: 400px; background: #d4a572; top: -150px; left: -150px; }
        .shape:nth-child(2) { width: 300px; height: 300px; background: #2c3e50; bottom: -100px; right: -100px; animation-delay: -5s; }

        @keyframes move {
            from { transform: translate(0, 0); }
            to { transform: translate(100px, 100px); }
        }

        /* Glassmorphism card */
        .glass-card {
            width: 400px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.2);
            text-align: center;
            color: #fff;
        }

        h2 { font-weight: 300; letter-spacing: 2px; margin-bottom: 30px; }

        .input-group { position: relative; margin-bottom: 25px; }

        input {
            width: 100%;
            padding: 10px 0;
            background: transparent;
            border: none;
            border-bottom: 1px solid #fff;
            outline: none;
            color: #fff;
            font-size: 16px;
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            color: #111;
            transition: 0.3s;
        }

        .btn:hover { background: #d4a572; color: #fff; }

        .link { display: block; margin-top: 20px; font-size: 12px; color: #aaa; cursor: pointer; text-decoration: underline; }
    </style>
</head>
<body>

    <div class="background">
        <div class="shape"></div>
        <div class="shape"></div>
    </div>

    <div class="glass-card">
        <h2>PORTAL ACCESS</h2>
        <div class="input-group">
            <input type="email" id="loginEmail" placeholder="Gmail Address" required>
        </div>
        <div class="input-group">
            <input type="password" id="loginPass" placeholder="Password" required>
        </div>
        <button class="btn" onclick="handleLogin()">LOGIN</button>
        <span class="link" onclick="location.href='index.html'">Back to Welcome</span>
    </div>

    <script>
        function handleLogin() {
            const email = document.getElementById('loginEmail').value.trim().toLowerCase();
            const pass = document.getElementById('loginPass').value;
            const stored = JSON.parse(localStorage.getItem(email));

            if (stored && stored.password === pass) {
                // REDIRECT TO YOUR SPECIFIC FILE
                window.location.href = "cave conference.html"; 
            } else {
                alert("Invalid Credentials. Please register first.");
            }
        }
    </script>
</body>
</html>
