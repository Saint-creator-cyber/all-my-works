<!-- Load Official Brand Icons -->
<link rel="stylesheet" href="https://cloudflare.com">

<script src="https://fontawesome.com" crossorigin="anonymous"></script>

<div class="main-viewport">
  <div class="grid-container">
    <!-- Facebook -->
    <div class="glass-login-box fb">
      <i class="fab fa-facebook logo"></i>
      <h3>Facebook</h3>
      <input type="text" placeholder="Email or Phone">
      <button>Login</button>
    </div>

    <!-- TikTok -->
    <div class="glass-login-box tt">
      <i class="fab fa-tiktok logo"></i>
      <h3>TikTok</h3>
      <input type="text" placeholder="Username">
      <button>Login</button>
    </div>

    <!-- Instagram -->
    <div class="glass-login-box ig">
      <i class="fab fa-instagram logo"></i>
      <h3>Instagram</h3>
      <input type="text" placeholder="Phone, user, or email">
      <button>Login</button>
    </div>

    <!-- Twitter / X -->
    <div class="glass-login-box x">
      <i class="fab fa-x-twitter logo"></i>
      <h3>Twitter / X</h3>
      <input type="text" placeholder="Phone, email, or username">
      <button>Login</button>
    </div>

    <!-- YouTube -->
    <div class="glass-login-box yt">
      <i class="fab fa-youtube logo"></i>
      <h3>YouTube</h3>
      <input type="email" placeholder="Email or phone">
      <button>Login</button>
    </div>

    <!-- GitHub -->
    <div class="glass-login-box gh">
      <i class="fab fa-github logo"></i>
      <h3>GitHub</h3>
      <input type="text" placeholder="Username or email">
      <button>Login</button>
    </div>

    <!-- Google -->
    <div class="glass-login-box go">
      <i class="fab fa-google logo"></i>
      <h3>Google</h3>
      <input type="email" placeholder="Email or phone">
      <button>Login</button>
    </div>
  </div>
</div>

<style>
  /* Official Mesh Gradient Background for 2026 */
  .main-viewport {
    min-height: 100vh;
    background: radial-gradient(at 0% 0%, #4361ee 0px, transparent 50%),
                radial-gradient(at 100% 0%, #7209b7 0px, transparent 50%),
                radial-gradient(at 100% 100%, #f72585 0px, transparent 50%),
                radial-gradient(at 0% 100%, #4cc9f0 0px, transparent 50%),
                #3f37c9;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 40px;
    font-family: 'Inter', sans-serif;
  }
 @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        
  .grid-container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 30px;
    width: 100%;
    max-width: 1400px;
  }

  .glass-login-box {
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(12px); /* Standard blur for premium glass */
    border: 1px solid rgba(255, 255, 255, 0.2); /* Light catcher border */
    border-radius: 24px;
    padding: 30px;
    text-align: center;
    color: white;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  }

  .glass-login-box:hover {
    transform: translateY(-10px);
    background: rgba(255, 255, 255, 0.15);
    box-shadow: 0 20px 40px rgba(0,0,0,0.3);
  }

  .logo {
    font-size: 3rem;
    margin-bottom: 15px;
    filter: drop-shadow(0 0 10px rgba(255,255,255,0.2));
  }

  h3 { margin-bottom: 20px; font-weight: 600; font-size: 1.4rem; }

  input {
    width: 100%;
    padding: 12px;
    margin-bottom: 15px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.05);
    color: white;
    outline: none;
  }

  button {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: white;
    color: #333;
    font-weight: 700;
    cursor: pointer;
    transition: 0.3s;
  }

  button:hover { opacity: 0.9; transform: scale(1.02); }

  /* Official Brand Colors for Logos */
  .fb .logo { color: #1877F2; }
  .tt .logo { color: #00f2ea; } /* TikTok Cyan */
  .ig .logo { color: #E4405F; }
  .x  .logo { color: #000000; }
  .yt .logo { color: #FF0000; }
  .gh .logo { color: #f0f6fc; }
  .go .logo { color: #4285F4; }
</style>
