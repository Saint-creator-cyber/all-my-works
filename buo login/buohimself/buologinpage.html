<style>
    /* --- GLOBAL STYLES --- */
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Montserrat', sans-serif;
    }

    body {
        background: #0b0b0b;
        color: #fff;
        overflow: hidden;
    }

    /* --- SPLIT SCREEN LAYOUT --- */
    .split-screen {
        display: flex;
        height: 100vh;
        width: 100%;
    }

    .left,
    .right {
        flex: 1;
        background-size: cover;
        background-position: center;
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    /* Background Images for Login */
    .left {
        background-image: url('https://unsplash.com');
    }

    .right {
        background-image: url('https://unsplash.com');
    }

    .overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
    }

    .content h1 {
        position: relative;
        z-index: 1;
        font-family: 'Playfair Display', serif;
        font-size: 2.5rem;
        letter-spacing: 3px;
        text-transform: uppercase;
    }

    /* --- LOGIN CARD --- */
    .login-card {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 400px;
        background: rgba(20, 20, 20, 0.85);
        backdrop-filter: blur(15px);
        padding: 45px;
        border-radius: 15px;
        border: 1px solid rgba(212, 175, 55, 0.3);
        text-align: center;
        z-index: 10;
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.7);
    }

    .logo {
        width: 80px;
        margin-bottom: 15px;
        border-radius: 50%;
        border: 1px solid #D4AF37;
    }

    h2 {
        font-family: 'Playfair Display', serif;
        color: #D4AF37;
        margin-bottom: 25px;
        letter-spacing: 1px;
    }

    /* --- FORM ELEMENTS --- */
    .input-group {
        margin-bottom: 15px;
    }

    input {
        width: 100%;
        padding: 14px;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 5px;
        color: #fff;
        font-size: 1rem;
        transition: 0.3s;
    }

    input:focus {
        border-color: #D4AF37;
        background: rgba(255, 255, 255, 0.1);
        outline: none;
        box-shadow: 0 0 10px rgba(212, 175, 55, 0.2);
    }

    .btn-login {
        width: 100%;
        padding: 14px;
        background: #D4AF37;
        border: none;
        border-radius: 5px;
        color: #000;
        font-weight: 700;
        font-size: 1rem;
        cursor: pointer;
        transition: 0.3s;
        letter-spacing: 1px;
    }

    .btn-login:hover {
        background: #b8952e;
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
    }

    /* --- FOOTER & LINKS --- */
    .form-footer {
        margin-top: 20px;
        font-size: 0.85rem;
        color: #bbb;
    }

    .form-footer p {
        margin-top: 10px;
    }

    .gold-text {
        color: #D4AF37 !important;
        text-decoration: none;
        font-weight: 600;
        transition: 0.3s;
    }

    .gold-text:hover {
        text-decoration: underline;
    }

    /* --- RESPONSIVE DESIGN --- */
    @media (max-width: 768px) {
        .split-screen {
            flex-direction: column;
        }

        .left,
        .right {
            height: 50vh;
        }

        .login-card {
            width: 90%;
        }
    }
</style>

<body>

    <div class="login-card">
        <img src="https://i.pinimg.com/1200x/31/8a/8c/318a8c35dce69054524cedc48f8d4db3.jpg" alt="SAINT Logo"
            class="logo">
        <h2>Welcome Back</h2>

        <!-- Added ID to form for JavaScript control -->
        <form id="loginForm">
            <div class="input-group">
                <input type="email" id="loginEmail" placeholder="Email Address" required>
            </div>
            <div class="input-group">
                <input type="password" id="loginPassword" placeholder="Password" required>
            </div>
            <button type="submit" class="btn-login">LOGIN</button>

            <div class="form-footer">
                <a href="forgettenpasssword.html">Forgot Password?</a>
                <p style="margin-top: 10px;">New here? <a href="create account.html" class="gold-text">Create
                        Account</a></p>
            </div>
        </form>
    </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function (e) {
            e.preventDefault();

            const emailInput = document.getElementById('loginEmail').value;
            const passwordInput = document.getElementById('loginPassword').value;

            // 1. GET THE SAVED CREDENTIALS
            const storedEmail = localStorage.getItem('saint_user_email');
            const storedPassword = localStorage.getItem('saint_user_password');

            // 2. CHECK IF ACCOUNT EXISTS
            if (emailInput !== storedEmail) {
                alert("No account found with this email. Redirecting to Signup...");
                window.location.href = "create account.html";
                return;
            }

            // 3. CHECK IF PASSWORD IS WRONG
            if (passwordInput !== storedPassword) {
                alert("Incorrect password. Please try again.");
                return;
            }

            // 4. SUCCESS: PROCEED TO DASHBOARD
            const btn = document.querySelector('.btn-login');
            btn.innerText = "AUTHENTICATING...";
            setTimeout(() => {
                window.location.href = "000.html";
            }, 1000);
        });


    </script>
</body>

</html>
