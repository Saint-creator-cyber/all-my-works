<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stacked Glassmorphism Form</title>
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        @import url('https://googleapis.com');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        /* --- MOVING GRADIENT BACKGROUND --- */
        body {
            background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #4c1d95);
            background-size: 400% 400%;
            animation: gradientAnimation 15s ease infinite;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        @keyframes gradientAnimation {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        .main-wrapper {
            position: relative;
            width: 850px;
            height: 520px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* --- GLASS CARD STYLING --- */
        .card {
            position: absolute;
            width: 100%;
            height: 100%;
            /* Semi-transparent background for glass effect */
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            /* This creates the frosted glass look */
            -webkit-backdrop-filter: blur(15px);
            border-radius: 25px;
            display: flex;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.2);
            transition: all 0.7s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Stacked Shuffling Animation */
        .card.front {
            z-index: 5;
            transform: scale(1) translateZ(0);
            opacity: 1;
        }

        .card.back {
            z-index: 1;
            transform: scale(0.85) translateY(-40px);
            opacity: 0.2;
            filter: blur(4px);
            pointer-events: none;
        }

        /* --- DIAGONAL PURPLE SECTION --- */
        .info-side {
            width: 45%;
            background: linear-gradient(135deg, rgba(76, 29, 149, 0.8), rgba(116, 37, 236, 0.8));
            padding: 50px;
            color: #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            clip-path: polygon(0 0, 100% 0, 80% 100%, 0% 100%);
        }

        .info-side h1 {
            font-size: 2.2rem;
            line-height: 1.2;
            margin-bottom: 15px;
        }

        .info-side p {
            font-size: 0.9rem;
            opacity: 0.8;
            line-height: 1.6;
        }

        /* --- FORM SECTION --- */
        .form-side {
            width: 55%;
            padding: 50px;
            color: #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        h2 {
            font-size: 2rem;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }

        .input-group {
            position: relative;
            margin-bottom: 30px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }

        .input-group input {
            width: 100%;
            background: transparent;
            border: none;
            outline: none;
            padding: 10px 30px 10px 5px;
            color: #fff;
            font-size: 1rem;
        }

        .input-group label {
            position: absolute;
            left: 5px;
            top: 10px;
            color: rgba(255, 255, 255, 0.5);
            transition: 0.3s;
            pointer-events: none;
        }

        .input-group input:focus~label,
        .input-group input:valid~label {
            top: -15px;
            font-size: 0.8rem;
            color: #a855f7;
        }

        .input-group i {
            position: absolute;
            right: 5px;
            top: 12px;
            color: rgba(255, 255, 255, 0.3);
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: linear-gradient(to right, #7425ec, #a855f7);
            border: none;
            border-radius: 30px;
            color: #fff;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: 0.4s;
            margin-top: 10px;
        }

        .btn-submit:hover {
            box-shadow: 0 0 20px rgba(168, 85, 247, 0.6);
            transform: translateY(-2px);
        }

        .switch-btn {
            background: none;
            border: none;
            color: #a855f7;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            font-size: 0.9rem;
            text-decoration: underline;
            transition: 0.3s;
        }

        .switch-btn:hover {
            color: #fff;
        }
    </style>
</head>

<body>

    <div class="main-wrapper">

        <!-- LOGIN CARD -->
        <div class="card front" id="loginCard">
            <div class="info-side">
                <h1>WELCOME<br>BACK!</h1>
                <p>Login to your account to access your personal dashboard and stay connected.</p>
            </div>
            <div class="form-side">
                <h2>Login</h2>
                <form>
                    <div class="input-group">
                        <input type="email" required>
                        <label>Email Address</label>
                        <i class="fa-solid fa-envelope"></i>
                    </div>
                    <div class="input-group">
                        <input type="password" required>
                        <label>Password</label>
                        <i class="fa-solid fa-lock"></i>
                    </div>
                    <button type="submit" class="btn-submit">Sign In</button>
                </form>
                <p style="margin-top:20px; font-size: 0.85rem; color: rgba(255,255,255,0.6);">
                    Don't have an account? <button class="switch-btn" id="toSignup">Sign Up</button>
                </p>
            </div>
        </div>

        <!-- SIGNUP CARD -->
        <div class="card back" id="signupCard">
            <div class="info-side">
                <h1>CREATE<br>ACCOUNT</h1>
                <p>Join our exclusive community and unlock a world of possibilities today.</p>
            </div>
            <div class="form-side">
                <h2>Sign Up</h2>
                <form>
                    <div class="input-group">
                        <input type="text" required>
                        <label>Full Name</label>
                        <i class="fa-solid fa-user"></i>
                    </div>
                    <div class="input-group">
                        <input type="email" required>
                        <label>Email Address</label>
                        <i class="fa-solid fa-envelope"></i>
                    </div>
                    <div class="input-group">
                        <input type="password" required>
                        <label>Password</label>
                        <i class="fa-solid fa-lock"></i>
                    </div>
                    <button type="submit" class="btn-submit">Register</button>
                </form>
                <p style="margin-top:20px; font-size: 0.85rem; color: rgba(255,255,255,0.6);">
                    Already a member? <button class="switch-btn" id="toLogin">Login</button>
                </p>
            </div>
        </div>

    </div>

    <script>
        const loginCard = document.getElementById('loginCard');
        const signupCard = document.getElementById('signupCard');
        const toSignup = document.getElementById('toSignup');
        const toLogin = document.getElementById('toLogin');

        toSignup.addEventListener('click', () => {
            loginCard.classList.replace('front', 'back');
            signupCard.classList.replace('back', 'front');
        });

        toLogin.addEventListener('click', () => {
            signupCard.classList.replace('front', 'back');
            loginCard.classList.replace('back', 'front');
        });
    </script>
</body>

</html>
