<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pulsing Neon Split Form</title>
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        @import url('https://googleapis.com');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: #050505;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            transition: background 0.5s ease;
        }

        /* --- BACKGROUND PULSE LAYER --- */
        body.pulse-active {
            background-color: #120525;
            /* Temporary brighten on switch */
        }

        /* --- ORBITING CONTAINER --- */
        .orbit-container {
            position: relative;
            width: 780px;
            height: 480px;
            background: #000;
            border-radius: 25px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            transition: transform 0.3s ease;
        }

        /* The spinning neon line */
        .orbit-container::before {
            content: '';
            position: absolute;
            width: 150%;
            height: 150%;
            background-image: conic-gradient(transparent, #7425ec, #00ffff, transparent);
            animation: rotate 4s linear infinite;
        }

        /* Pulse burst effect on the border */
        .orbit-container.pulse::before {
            background-image: conic-gradient(#ff00ff, #00ffff, #7425ec, #ff00ff);
            animation: rotate 1s linear infinite;
            /* Faster rotation during pulse */
        }

        .orbit-container::after {
            content: '';
            position: absolute;
            inset: 3px;
            background: #000;
            border-radius: 22px;
            z-index: 1;
        }

        @keyframes rotate {
            100% {
                transform: rotate(360deg);
            }
        }

        /* --- THE CARD --- */
        .card {
            position: relative;
            width: 100%;
            height: 100%;
            z-index: 10;
            display: flex;
            border-radius: 22px;
            overflow: hidden;
        }

        /* Diagonal Purple Split (matches your image) */
        .info-side {
            width: 45%;
            background: linear-gradient(135deg, #4c1d95, #7425ec);
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 50px;
            color: #fff;
            clip-path: polygon(0 0, 100% 0, 80% 100%, 0% 100%);
            z-index: 2;
            transition: 0.5s ease;
        }

        .info-side h1 {
            font-size: 2.4rem;
            line-height: 1.1;
            margin-bottom: 15px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        .info-side p {
            font-size: 0.9rem;
            opacity: 0.8;
            line-height: 1.6;
        }

        /* Stacked Forms Section */
        .form-side {
            width: 55%;
            position: relative;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .form-box {
            position: absolute;
            width: 100%;
            padding: 0 60px;
            transition: 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            color: #fff;
            opacity: 0;
            transform: scale(0.9) translateX(50px);
            pointer-events: none;
        }

        .form-box.active {
            opacity: 1;
            transform: scale(1) translateX(0);
            pointer-events: all;
        }

        h2 {
            font-size: 2.2rem;
            margin-bottom: 30px;
            font-weight: 700;
        }

        .input-group {
            position: relative;
            margin-bottom: 25px;
            border-bottom: 2px solid #333;
        }

        .input-group input {
            width: 100%;
            background: transparent;
            border: none;
            outline: none;
            padding: 10px 35px 10px 0;
            color: #fff;
            font-size: 1rem;
        }

        .input-group label {
            position: absolute;
            left: 0;
            top: 10px;
            color: #777;
            transition: 0.3s;
            pointer-events: none;
        }

        .input-group input:focus~label,
        .input-group input:valid~label {
            top: -15px;
            font-size: 0.8rem;
            color: #00ffff;
            text-shadow: 0 0 8px #00ffff;
        }

        .input-group i {
            position: absolute;
            right: 0;
            top: 12px;
            color: #555;
            transition: 0.3s;
        }

        .input-group input:focus~i {
            color: #00ffff;
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: linear-gradient(to right, #7425ec, #a855f7);
            border: none;
            border-radius: 30px;
            color: #fff;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(116, 37, 236, 0.4);
            transition: 0.3s;
        }

        .btn-submit:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(116, 37, 236, 0.6);
        }

        .switch-link {
            text-align: center;
            margin-top: 25px;
            font-size: 0.85rem;
            color: #999;
        }

        .switch-link a {
            color: #00ffff;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }

        .switch-link a:hover {
            text-shadow: 0 0 10px #00ffff;
        }
    </style>
</head>

<body>

    <div class="orbit-container" id="orbit">
        <div class="card">

            <!-- Diagonal Info Side -->
            <div class="info-side" id="infoSide">
                <h1 id="sideTitle">WELCOME<br>BACK!</h1>
                <p id="sideDesc">Log in to your account to continue your journey with our community.</p>
            </div>

            <!-- Form Side (Stacked) -->
            <div class="form-side">

                <!-- Sign Up Form -->
                <div class="form-box active" id="signupBox">
                    <h2>Sign Up</h2>
                    <form>
                        <div class="input-group">
                            <input type="text" required>
                            <label>Username</label>
                            <i class="fa-solid fa-user"></i>
                        </div>
                        <div class="input-group">
                            <input type="email" required>
                            <label>Email</label>
                            <i class="fa-solid fa-envelope"></i>
                        </div>
                        <div class="input-group">
                            <input type="password" required>
                            <label>Password</label>
                            <i class="fa-solid fa-lock"></i>
                        </div>
                        <button type="submit" class="btn-submit">Create Account</button>
                    </form>
                    <p class="switch-link">Already a member? <a href="#" id="toLogin">Login</a></p>
                </div>

                <!-- Login Form -->
                <div class="form-box" id="loginBox">
                    <h2>Login</h2>
                    <form>
                        <div class="input-group">
                            <input type="email" required>
                            <label>Email</label>
                            <i class="fa-solid fa-envelope"></i>
                        </div>
                        <div class="input-group">
                            <input type="password" required>
                            <label>Password</label>
                            <i class="fa-solid fa-lock"></i>
                        </div>
                        <button type="submit" class="btn-submit">Sign In</button>
                    </form>
                    <p class="switch-link">New here? <a href="#" id="toSignup">Join Now</a></p>
                </div>

            </div>
        </div>
    </div>

    <script>
        const signupBox = document.getElementById('signupBox');
        const loginBox = document.getElementById('loginBox');
        const sideTitle = document.getElementById('sideTitle');
        const sideDesc = document.getElementById('sideDesc');
        const orbit = document.getElementById('orbit');
        const body = document.body;

        function triggerPulse() {
            // Add pulse classes
            orbit.classList.add('pulse');
            body.classList.add('pulse-active');

            // Remove pulse classes after 500ms
            setTimeout(() => {
                orbit.classList.remove('pulse');
                body.classList.remove('pulse-active');
            }, 600);
        }

        document.getElementById('toLogin').onclick = (e) => {
            e.preventDefault();
            triggerPulse();
            signupBox.classList.remove('active');
            loginBox.classList.add('active');
            sideTitle.innerHTML = "HELLO<br>FRIEND!";
            sideDesc.innerText = "Enter your personal details to start your journey with us.";
        };

        document.getElementById('toSignup').onclick = (e) => {
            e.preventDefault();
            triggerPulse();
            loginBox.classList.remove('active');
            signupBox.classList.add('active');
            sideTitle.innerHTML = "WELCOME<br>BACK!";
            sideDesc.innerText = "Log in to your account to continue your journey with our community.";
        };
    </script>
</body>

</html>
